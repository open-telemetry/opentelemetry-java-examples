[tools]
"aqua:grafana/oats" = "0.7.0"
k3d = "5.8.3"
kubectl = "1.36.1"

# Linters
"aqua:grafana/flint" = "0.22.4"
lychee = "0.24.2"
rumdl = "0.1.91"

[env]
FLINT_CONFIG_DIR = ".github/config"

[tasks.lint]
description = "Run all lints"
run = "flint run"

[tasks."lint:fix"]
description = "Auto-fix lint issues"
run = "flint run --fix"
